; Export presets for Black Stela.
;
; The renderer is gl_compatibility (project.godot) precisely so the Web export stays available — the
; S5 decision that kept this GDScript-only, with no unofficial bindings.
;
; Building requires Godot's EXPORT TEMPLATES for 4.7.1, which are a separate download:
;   Godot editor -> Editor -> Manage Export Templates -> Download
; then:
;   godot --headless --path godot/ --export-release "Web"   build/web/index.html
;   godot --headless --path godot/ --export-release "macOS" build/BlackStela.dmg
;
; `godot/data/` and `godot/assets/` are generated/staged (gitignored) — run `npm run export:godot`
; and stage the art before exporting, or the build ships without its worlds.

[preset.0]

name="Web"
platform="Web"
runnable=true
custom_features=""
export_filter="all_resources"
; data/*.json and the staged art are read at runtime with FileAccess / Image.load_from_file — they are
; NOT Godot-imported resources, so "all_resources" alone would ship a build with no worlds and no art.
; They must be named explicitly or the export silently drops them.
include_filter="*.json, *.png, *.jpg"
; Ship the worlds and the engine/copy bridge — but NOT the parity fixtures or sample data:
; data/traces/* and *-samples.json are the migration gate's test material, not the player's game.
exclude_filter="tests/*, gates/*, data/traces/*, data/*-samples.json, data/save-fixtures.json"
export_path="../build/web/index.html"

[preset.0.options]

variant/extensions_support=false
vram_texture_compression/for_desktop=true
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
progressive_web_app/enabled=false

[preset.1]

name="macOS"
platform="macOS"
runnable=true
custom_features=""
export_filter="all_resources"
; data/*.json and the staged art are read at runtime with FileAccess / Image.load_from_file — they are
; NOT Godot-imported resources, so "all_resources" alone would ship a build with no worlds and no art.
; They must be named explicitly or the export silently drops them.
include_filter="*.json, *.png, *.jpg"
; Ship the worlds and the engine/copy bridge — but NOT the parity fixtures or sample data:
; data/traces/* and *-samples.json are the migration gate's test material, not the player's game.
exclude_filter="tests/*, gates/*, data/traces/*, data/*-samples.json, data/save-fixtures.json"
export_path="../build/macos/BlackStela.zip"

[preset.1.options]

application/bundle_identifier="com.blackstela.game"
application/short_version="0.1.0"
application/version="0.1.0"
codesign/enable=false
notarization/notarization=0
